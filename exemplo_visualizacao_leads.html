<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Leads - Coach Kama</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1000px; margin: 0 auto; }
        table { background: white; width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #2c3e50; color: white; }
        .btn { padding: 10px 20px; background: #e67e22; color: white; text-decoration: none; border-radius: 5px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Painel de Leads - Coach Kama</h1>

        <div class="stats">
            <div class="stat-card">
                <h3 id="totalLeads">0</h3>
                <p>Total Leads</p>
            </div>
            <div class="stat-card">
                <h3 id="hoje">0</h3>
                <p>Hoje</p>
            </div>
            <div class="stat-card">
                <h3 id="iniciantes">0</h3>
                <p>Iniciantes</p>
            </div>
            <div class="stat-card">
                <h3 id="avancados">0</h3>
                <p>Avançados</p>
            </div>
        </div>

        <table id="leadsTable">
            <thead>
                <tr>
                    <th>Data/Hora</th>
                    <th>Nome</th>
                    <th>WhatsApp</th>
                    <th>Nível</th>
                    <th>Objetivo</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="leadsList">
                <!-- Leads aparecerão aqui -->
            </tbody>
        </table>

        <a href="#" class="btn" onclick="exportExcel()">📥 Exportar Excel</a>
    </div>

    <script>
        // Carregar leads do localStorage
        function carregarLeads() {
            let leads = localStorage.getItem('leads_kama') || '[]';
            return JSON.parse(leads);
        }

        // Atualizar estatísticas
        function atualizarStats(leads) {
            const hoje = new Date().toLocaleDateString('pt-BR');
            const leadsHoje = leads.filter(l => l.data.startsWith(hoje.split(' ')[0]));

            document.getElementById('totalLeads').textContent = leads.length;
            document.getElementById('hoje').textContent = leadsHoje.length;
            document.getElementById('iniciantes').textContent = leads.filter(l => l.nivel === 'iniciante').length;
            document.getElementById('avancados').textContent = leads.filter(l => l.nivel === 'avancado').length;
        }

        // Exibir leads na tabela
        function exibirLeads() {
            const leads = carregarLeads();
            const tbody = document.getElementById('leadsList');

            tbody.innerHTML = leads.reverse().map(lead => `
                <tr>
                    <td>${lead.data}</td>
                    <td>${lead.nome}</td>
                    <td>${lead.whatsapp}</td>
                    <td>${lead.nivel}</td>
                    <td>${lead.objetivo}</td>
                    <td>
                        <a href="https://wa.me/55${lead.whatsapp}" class="btn">WhatsApp</a>
                    </td>
                </tr>
            `).join('');

            atualizarStats(leads);
        }

        // Exportar para Excel
        function exportExcel() {
            const leads = carregarLeads();
            let csv = "Data,Nome,WhatsApp,Nível,Objetivo\n";

            leads.forEach(lead => {
                csv += `${lead.data},"${lead.nome}",${lead.whatsapp},${lead.nivel},"${lead.objetivo}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'leads_coach_kama.csv';
            a.click();
        }

        // Carregar ao abrir página
        exibirLeads();

        // Atualizar a cada 30 segundos
        setInterval(exibirLeads, 30000);
    </script>
</body>
</html>
